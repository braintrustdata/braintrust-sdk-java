  dependsOn braintrustAgentJar, classes

  mainClass = 'dev.braintrust.smoketest.ddagent.DdAgentSmokeTest'
  classpath = sourceSets.main.runtimeClasspath

  def btAgent = braintrustAgentJar.map { it.archiveFile.get().asFile.absolutePath }
  def ddAgentJar = configurations.ddAgent.singleFile

  jvmArgs = [
    "-javaagent:${btAgent.get()}",
    "-javaagent:${ddAgentJar.absolutePath}",
    "-Ddd.trace.otel.enabled=true",
    "-Ddd.trace.enabled=true",
    "-Ddd.trace.writer.type=LoggingWriter",
    "-Ddd.trace.agent.url=unix:///dev/null",
    "-Dotel.java.global-autoconfigure.enabled=true",
    "-Dotel.traces.exporter=none",
    "-Dotel.metrics.exporter=none",
    "-Dotel.logs.exporter=none",
    "-Ddd.service=bt-dd-smoke-test",
    "-Dbraintrust.dd.bridge.smoketest=true",
    // "-Ddd.trace.debug=true",
  ]

  // Make sure OTEL/DD environment doesn't leak from the host
  environment.remove('DD_API_KEY')
  environment.remove('DD_AGENT_HOST')
  environment.remove('OTEL_EXPORTER_OTLP_ENDPOINT')
  environment.remove('OTEL_TRACES_EXPORTER')

  environment 'OTEL_TRACES_EXPORTER', 'none'
  environment 'OTEL_METRICS_EXPORTER', 'none'
  environment 'OTEL_LOGS_EXPORTER', 'none'

  inputs.files(braintrustAgentJar)
  inputs.files(configurations.ddAgent)
  inputs.files(sourceSets.main.output)
  def markerFile = layout.buildDirectory.file('test-results/bt-agent-first-smoke-test.passed')
  outputs.file(markerFile)

  doLast {
    markerFile.get().asFile.tap {
      parentFile.mkdirs()
      text = "passed at ${java.time.Instant.now()}"
    }
  }
}

/**
 * Smoke test: DD agent only (no Braintrust agent).
 * Verifies that DD-only assertions pass and OTel assertions are skipped.
 */
task smokeTestDdOnly(type: JavaExec) {
  dependsOn classes

  mainClass = 'dev.braintrust.smoketest.ddagent.DdAgentSmokeTest'
  classpath = sourceSets.main.runtimeClasspath

  def ddAgentJar = configurations.ddAgent.singleFile

  jvmArgs = [
    "-javaagent:${ddAgentJar.absolutePath}",
    "-Ddd.trace.otel.enabled=true",
    "-Ddd.trace.enabled=true",
    "-Ddd.trace.writer.type=LoggingWriter",
    "-Ddd.trace.agent.url=unix:///dev/null",
    "-Ddd.service=bt-dd-smoke-test",
  ]

  environment.remove('DD_API_KEY')
  environment.remove('DD_AGENT_HOST')
  environment.remove('OTEL_EXPORTER_OTLP_ENDPOINT')
  environment.remove('OTEL_TRACES_EXPORTER')

  inputs.files(configurations.ddAgent)
  inputs.files(sourceSets.main.output)
  def markerFile = layout.buildDirectory.file('test-results/dd-only-smoke-test.passed')
  outputs.file(markerFile)

  doLast {
    markerFile.get().asFile.tap {
      parentFile.mkdirs()
      text = "passed at ${java.time.Instant.now()}"
    }
  }
}

// FIXME -- require dd smoke tests to pass
test.dependsOn smokeTestDdOnly, smokeTestDDAgentFirst // TODO: , smokeTestBTAgentFirst
